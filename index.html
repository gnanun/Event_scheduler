<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEMPUS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:24px 16px}
.wrap{max-width:900px;margin:0 auto}
.hdr{text-align:center;margin-bottom:28px}
.hdr h1{font-size:52px;font-weight:800;color:#fff;letter-spacing:-1px;line-height:1}
.hdr p{color:rgba(255,255,255,0.75);font-size:15px;margin-top:6px;font-weight:300;letter-spacing:2px}
.card{background:rgba(255,255,255,0.97);border-radius:24px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:20px;background:linear-gradient(to right,rgba(103,126,234,0.06),rgba(118,75,162,0.06));border-bottom:1px solid rgba(103,126,234,0.1)}
.stat{background:#fff;border-radius:16px;padding:14px;text-align:center;border:1px solid rgba(103,126,234,0.08)}
.stat i{font-size:20px;margin-bottom:6px;display:block}
.stat .num{font-size:28px;font-weight:700;color:#1a1a2e;line-height:1}
.stat .lbl{font-size:11px;color:#888;font-weight:500;margin-top:3px}
.body{display:grid;grid-template-columns:260px 1fr;gap:0}
.sidebar{border-right:1px solid #f0eeff;padding:20px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-nav h3{font-size:14px;font-weight:600;color:#333}
.cal-nav button{background:none;border:none;color:#764ba2;cursor:pointer;padding:4px 8px;border-radius:8px;font-size:13px}
.cal-nav button:hover{background:#f3f0ff}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.cal-dow{font-size:10px;font-weight:600;color:#aaa;padding:4px 0}
.cal-day{font-size:12px;padding:6px 2px;border-radius:8px;cursor:pointer;color:#444;position:relative;transition:all 0.15s}
.cal-day:hover{background:#ede9fe;color:#764ba2}
.cal-day.today{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-weight:700}
.cal-day.sel{background:#764ba2;color:#fff;font-weight:600}
.cal-day.has-ev::after{content:'';width:4px;height:4px;background:#764ba2;border-radius:50%;position:absolute;bottom:1px;left:50%;transform:translateX(-50%)}
.cal-day.today.has-ev::after,.cal-day.sel.has-ev::after{background:#fff}
.cal-empty{padding:6px 0}
.sidebar-sec{margin-top:18px}
.sidebar-sec h4{font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.filter-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;border-radius:10px;border:none;background:none;cursor:pointer;font-size:13px;color:#555;transition:all 0.15s;text-align:left}
.filter-btn:hover{background:#f3f0ff;color:#764ba2}
.filter-btn.active{background:#ede9fe;color:#764ba2;font-weight:600}
.filter-btn .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.main{padding:20px}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.btn-new{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.2s}
.btn-new:hover{opacity:0.9;transform:translateY(-1px)}
.search-wrap{flex:1;position:relative;min-width:160px}
.search-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#bbb;font-size:13px}
.search-wrap input{width:100%;padding:9px 12px 9px 34px;border:1px solid #e8e8e8;border-radius:12px;font-size:13px;outline:none;transition:all 0.2s;color:#333}
.search-wrap input:focus{border-color:#764ba2;box-shadow:0 0 0 3px rgba(118,75,162,0.1)}
.sort-sel{padding:9px 12px;border:1px solid #e8e8e8;border-radius:12px;font-size:13px;outline:none;color:#555;cursor:pointer;background:#fff}
.sort-sel:focus{border-color:#764ba2}
.events-list{display:flex;flex-direction:column;gap:10px;max-height:420px;overflow-y:auto;padding-right:4px}
.events-list::-webkit-scrollbar{width:4px}
.events-list::-webkit-scrollbar-thumb{background:#d8b4fe;border-radius:4px}
.ev-card{background:#fff;border:1px solid #f0eeff;border-radius:14px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px;transition:all 0.2s;position:relative}
.ev-card:hover{border-color:#c4b5fd;box-shadow:0 4px 16px rgba(118,75,162,0.08);transform:translateX(2px)}
.ev-card.past{opacity:0.55}
.ev-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:5px}
.ev-body{flex:1;min-width:0}
.ev-title{font-size:14px;font-weight:600;color:#1a1a2e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-desc{font-size:12px;color:#888;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
.ev-meta span{font-size:11px;color:#aaa;display:flex;align-items:center;gap:4px}
.ev-meta i{color:#c4b5fd;font-size:10px}
.ev-badge{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:600;white-space:nowrap}
.badge-upcoming{background:#f0fdf4;color:#16a34a}
.badge-today{background:#ede9fe;color:#764ba2}
.badge-past{background:#f5f5f5;color:#999}
.ev-actions{display:flex;gap:4px;flex-shrink:0}
.ev-actions button{background:none;border:none;padding:6px;border-radius:8px;cursor:pointer;font-size:13px;transition:all 0.15s}
.btn-edit{color:#764ba2}
.btn-edit:hover{background:#ede9fe}
.btn-del{color:#ef4444}
.btn-del:hover{background:#fef2f2}
.empty{text-align:center;padding:48px 20px;color:#ccc}
.empty i{font-size:40px;margin-bottom:12px;display:block}
.empty p{font-size:14px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:20px;width:100%;max-width:460px;box-shadow:0 24px 64px rgba(0,0,0,0.2);animation:pop 0.2s ease}
@keyframes pop{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 0}
.modal-hdr h3{font-size:17px;font-weight:700;color:#1a1a2e}
.modal-hdr button{background:none;border:none;font-size:22px;color:#bbb;cursor:pointer;line-height:1}
.modal-hdr button:hover{color:#555}
.modal-body{padding:18px 22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:#666;margin-bottom:5px}
.field input,.field textarea,.field select{width:100%;padding:10px 13px;border:1px solid #e8e8e8;border-radius:10px;font-size:13px;outline:none;transition:all 0.2s;color:#333;font-family:'Inter',sans-serif;background:#fff}
.field input:focus,.field textarea:focus,.field select:focus{border-color:#764ba2;box-shadow:0 0 0 3px rgba(118,75,162,0.1)}
.field textarea{resize:none;height:64px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.color-pick{display:flex;gap:8px;flex-wrap:wrap}
.color-opt{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all 0.15s}
.color-opt.sel{border-color:#333;transform:scale(1.15)}
.modal-foot{display:flex;gap:10px;padding:0 22px 20px}
.btn-save{flex:1;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;padding:11px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-save:hover{opacity:0.9}
.btn-cancel{flex:1;background:#f5f5f5;color:#555;border:none;padding:11px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer}
.btn-cancel:hover{background:#eee}
.btn-trash{background:#fef2f2;color:#ef4444;border:none;padding:11px 16px;border-radius:12px;font-size:14px;cursor:pointer}
.btn-trash:hover{background:#fee2e2}
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{background:#fff;border-radius:12px;padding:12px 18px;box-shadow:0 8px 24px rgba(0,0,0,0.12);font-size:13px;color:#333;display:flex;align-items:center;gap:10px;animation:tin 0.3s ease;border-left:4px solid #16a34a}
.toast.err{border-left-color:#ef4444}
@keyframes tin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.clear-link{font-size:12px;color:#764ba2;background:none;border:none;cursor:pointer;padding:0;text-decoration:underline;margin-left:auto}
.tag-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.tag{font-size:11px;padding:3px 9px;border-radius:6px;font-weight:500;cursor:pointer;border:1.5px solid transparent}
.tag.sel{border-color:currentColor}
@media(max-width:600px){
  .body{grid-template-columns:1fr}
  .sidebar{border-right:none;border-bottom:1px solid #f0eeff}
  .stats{grid-template-columns:repeat(2,1fr)}
  .hdr h1{font-size:36px}
  .row2{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <h1>TEMPUS</h1>
    <p>PRECISION IN EVERY MOMENT</p>
  </div>
  <div class="card">
    <div class="stats">
      <div class="stat"><i class="fas fa-calendar-alt" style="color:#764ba2"></i><div class="num" id="s-total">0</div><div class="lbl">Total</div></div>
      <div class="stat"><i class="fas fa-hourglass-half" style="color:#6366f1"></i><div class="num" id="s-upcoming">0</div><div class="lbl">Upcoming</div></div>
      <div class="stat"><i class="fas fa-star" style="color:#f59e0b"></i><div class="num" id="s-today">0</div><div class="lbl">Today</div></div>
      <div class="stat"><i class="fas fa-check-circle" style="color:#16a34a"></i><div class="num" id="s-done">0</div><div class="lbl">Completed</div></div>
    </div>
    <div class="body">
      <div class="sidebar">
        <div class="cal-nav">
          <button id="pM"><i class="fas fa-chevron-left"></i></button>
          <h3 id="calTitle"></h3>
          <button id="nM"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
        <div class="sidebar-sec">
          <h4>Filter by category</h4>
          <div id="catFilters"></div>
        </div>
        <div class="sidebar-sec">
          <h4>Quick filters</h4>
          <button class="filter-btn" id="f-all"><i class="fas fa-list" style="color:#764ba2;width:14px"></i> All events</button>
          <button class="filter-btn" id="f-today"><i class="fas fa-sun" style="color:#f59e0b;width:14px"></i> Today</button>
          <button class="filter-btn" id="f-week"><i class="fas fa-calendar-week" style="color:#6366f1;width:14px"></i> This week</button>
          <button class="filter-btn" id="f-upcoming"><i class="fas fa-arrow-right" style="color:#16a34a;width:14px"></i> Upcoming</button>
          <button class="filter-btn" id="f-past"><i class="fas fa-history" style="color:#aaa;width:14px"></i> Completed</button>
        </div>
      </div>
      <div class="main">
        <div class="toolbar">
          <button class="btn-new" onclick="openModal()"><i class="fas fa-plus"></i> New Event</button>
          <div class="search-wrap">
            <i class="fas fa-search"></i>
            <input type="text" id="searchIn" placeholder="Search events...">
          </div>
          <select class="sort-sel" id="sortSel">
            <option value="date-asc">Date ↑</option>
            <option value="date-desc">Date ↓</option>
            <option value="title">Title A-Z</option>
          </select>
          <button class="clear-link" id="clearBtn" style="display:none">Clear filter</button>
        </div>
        <div class="events-list" id="evList"></div>
      </div>
    </div>
  </div>
  <div style="text-align:center;margin-top:14px;color:rgba(255,255,255,0.5);font-size:12px"><i class="fas fa-lock" style="margin-right:4px"></i>All data saved locally in your browser</div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-hdr">
      <h3 id="modalTitle">New Event</h3>
      <button onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Title *</label>
        <input type="text" id="fTitle" placeholder="Event title">
      </div>
      <div class="field">
        <label>Description</label>
        <textarea id="fDesc" placeholder="Optional description..."></textarea>
      </div>
      <div class="field row2">
        <div>
          <label>Date *</label>
          <input type="date" id="fDate">
        </div>
        <div>
          <label>Time *</label>
          <input type="time" id="fTime">
        </div>
      </div>
      <div class="field">
        <label>Location</label>
        <input type="text" id="fLoc" placeholder="Optional location">
      </div>
      <div class="field">
        <label>Category</label>
        <select id="fCat">
          <option value="work">Work</option>
          <option value="personal">Personal</option>
          <option value="health">Health</option>
          <option value="social">Social</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="field">
        <label>Color</label>
        <div class="color-pick" id="colorPick"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-save" onclick="saveEvent()">Save Event</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-trash" id="delBtn" onclick="deleteEvent()" style="display:none"><i class="fas fa-trash"></i></button>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
const COLORS=['#764ba2','#6366f1','#f59e0b','#ef4444','#16a34a','#0ea5e9','#ec4899','#64748b'];
const CAT_COLORS={work:'#6366f1',personal:'#764ba2',health:'#16a34a',social:'#ec4899',other:'#64748b'};
const CAT_ICONS={work:'fa-briefcase',personal:'fa-user',health:'fa-heart',social:'fa-users',other:'fa-tag'};

let events=[];
let editId=null;
let selColor=COLORS[0];
let calYear=new Date().getFullYear();
let calMonth=new Date().getMonth();
let activeFilter='all';
let activeDateFilter=null;
let activeCatFilter=null;
let searchQ='';
let sortMode='date-asc';

function todayStr(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function weekEndStr(){
  const d=new Date();
  d.setDate(d.getDate()+(6-d.getDay()));
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function load(){
  try{events=JSON.parse(localStorage.getItem('tempus_v2')||'[]')}catch{events=[]}
  render();renderCal();renderCatFilters();
}

function save(){
  localStorage.setItem('tempus_v2',JSON.stringify(events));
  render();renderCal();renderCatFilters();
}

function getFiltered(){
  let list=[...events];
  const td=todayStr();
  const we=weekEndStr();
  if(activeDateFilter){list=list.filter(e=>e.date===activeDateFilter)}
  else if(activeFilter==='today'){list=list.filter(e=>e.date===td)}
  else if(activeFilter==='week'){list=list.filter(e=>e.date>=td&&e.date<=we)}
  else if(activeFilter==='upcoming'){list=list.filter(e=>e.date>td)}
  else if(activeFilter==='past'){list=list.filter(e=>e.date<td)}
  if(activeCatFilter){list=list.filter(e=>e.cat===activeCatFilter)}
  if(searchQ){const q=searchQ.toLowerCase();list=list.filter(e=>e.title.toLowerCase().includes(q)||(e.desc||'').toLowerCase().includes(q)||(e.loc||'').toLowerCase().includes(q))}
  if(sortMode==='date-asc'){list.sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time))}
  else if(sortMode==='date-desc'){list.sort((a,b)=>b.date.localeCompare(a.date)||b.time.localeCompare(a.time))}
  else if(sortMode==='title'){list.sort((a,b)=>a.title.localeCompare(b.title))}
  return list;
}

function render(){
  const td=todayStr();
  document.getElementById('s-total').textContent=events.length;
  document.getElementById('s-upcoming').textContent=events.filter(e=>e.date>td).length;
  document.getElementById('s-today').textContent=events.filter(e=>e.date===td).length;
  document.getElementById('s-done').textContent=events.filter(e=>e.date<td).length;

  const list=getFiltered();
  const el=document.getElementById('evList');
  if(!list.length){
    el.innerHTML=`<div class="empty"><i class="fas fa-calendar-plus"></i><p>${searchQ||activeDateFilter||activeCatFilter?'No events match your filter.':'No events yet. Click "New Event" to get started.'}</p></div>`;
    return;
  }
  el.innerHTML=list.map(ev=>{
    const past=ev.date<td;
    const isToday=ev.date===td;
    const badge=isToday?`<span class="ev-badge badge-today">Today</span>`:past?`<span class="ev-badge badge-past">Done</span>`:`<span class="ev-badge badge-upcoming">Upcoming</span>`;
    const catIcon=CAT_ICONS[ev.cat]||'fa-tag';
    const fmt=formatDate(ev.date);
    return `<div class="ev-card${past?' past':''}">
      <div class="ev-dot" style="background:${esc(ev.color||CAT_COLORS[ev.cat]||'#764ba2')}"></div>
      <div class="ev-body">
        <div style="display:flex;align-items:center;gap:8px">
          <div class="ev-title">${esc(ev.title)}</div>
          ${badge}
        </div>
        ${ev.desc?`<div class="ev-desc">${esc(ev.desc)}</div>`:''}
        <div class="ev-meta">
          <span><i class="far fa-calendar-alt"></i>${fmt}</span>
          <span><i class="far fa-clock"></i>${ev.time}</span>
          ${ev.loc?`<span><i class="fas fa-map-marker-alt"></i>${esc(ev.loc)}</span>`:''}
          <span><i class="fas ${catIcon}"></i>${ev.cat}</span>
        </div>
      </div>
      <div class="ev-actions">
        <button class="btn-edit" onclick="openModal('${esc(ev.id)}')"><i class="fas fa-pen"></i></button>
        <button class="btn-del" onclick="quickDel('${esc(ev.id)}')"><i class="fas fa-trash"></i></button>
      </div>
    </div>`;
  }).join('');

  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  if(!activeDateFilter&&!activeCatFilter){
    const fb=document.getElementById('f-'+activeFilter);
    if(fb)fb.classList.add('active');
  }
  const cb=document.getElementById('clearBtn');
  cb.style.display=(activeDateFilter||activeCatFilter||searchQ||activeFilter!=='all')?'':'none';
}

function formatDate(ds){
  const td=todayStr();
  const [y,m,d]=ds.split('-').map(Number);
  const dn=new Date(y,m-1,d);
  const tm=new Date();tm.setHours(0,0,0,0);
  const diff=Math.round((dn-tm)/864e5);
  if(diff===0)return'Today';
  if(diff===1)return'Tomorrow';
  if(diff===-1)return'Yesterday';
  return dn.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function renderCal(){
  const td=todayStr();
  const first=new Date(calYear,calMonth,1);
  const days=new Date(calYear,calMonth+1,0).getDate();
  const startDow=first.getDay();
  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('calTitle').textContent=`${MONTHS[calMonth]} ${calYear}`;
  const dows=['Su','Mo','Tu','We','Th','Fr','Sa'];
  let html=dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<startDow;i++)html+=`<div class="cal-empty"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isTd=ds===td;
    const isSel=ds===activeDateFilter;
    const hasEv=events.some(e=>e.date===ds);
    html+=`<div class="cal-day${isTd?' today':''}${isSel?' sel':''}${hasEv?' has-ev':''}" onclick="pickDate('${ds}')">${d}</div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
}

function pickDate(ds){
  activeDateFilter=activeDateFilter===ds?null:ds;
  activeCatFilter=null;activeFilter='all';
  render();renderCal();
  if(activeDateFilter)toast(`Showing events on ${formatDate(ds)}`);
}

function renderCatFilters(){
  const cats=['work','personal','health','social','other'];
  document.getElementById('catFilters').innerHTML=cats.map(c=>`
    <button class="filter-btn${activeCatFilter===c?' active':''}" onclick="pickCat('${c}')">
      <span class="dot" style="background:${CAT_COLORS[c]}"></span>
      <i class="fas ${CAT_ICONS[c]}" style="color:${CAT_COLORS[c]};width:14px;font-size:12px"></i>
      ${c.charAt(0).toUpperCase()+c.slice(1)}
    </button>`).join('');
}

function pickCat(c){
  activeCatFilter=activeCatFilter===c?null:c;
  activeDateFilter=null;activeFilter='all';
  render();renderCal();renderCatFilters();
}

function clearAll(){
  activeFilter='all';activeDateFilter=null;activeCatFilter=null;searchQ='';
  document.getElementById('searchIn').value='';
  render();renderCal();renderCatFilters();
  toast('Filters cleared');
}

function buildColorPick(cur){
  document.getElementById('colorPick').innerHTML=COLORS.map(c=>`
    <div class="color-opt${c===cur?' sel':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`).join('');
  selColor=cur;
}

function pickColor(c){
  selColor=c;
  document.querySelectorAll('.color-opt').forEach(el=>{
    el.classList.toggle('sel',el.style.background===c||el.style.background===hexToRgb(c));
  });
}

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${r}, ${g}, ${b})`;
}

function openModal(id){
  editId=id||null;
  const modal=document.getElementById('modalBg');
  modal.style.display='flex';
  const delBtn=document.getElementById('delBtn');
  if(id){
    const ev=events.find(e=>e.id===id);
    if(!ev)return;
    document.getElementById('modalTitle').textContent='Edit Event';
    document.getElementById('fTitle').value=ev.title;
    document.getElementById('fDesc').value=ev.desc||'';
    document.getElementById('fDate').value=ev.date;
    document.getElementById('fTime').value=ev.time;
    document.getElementById('fLoc').value=ev.loc||'';
    document.getElementById('fCat').value=ev.cat||'work';
    buildColorPick(ev.color||COLORS[0]);
    delBtn.style.display='';
  }else{
    document.getElementById('modalTitle').textContent='New Event';
    document.getElementById('fTitle').value='';
    document.getElementById('fDesc').value='';
    document.getElementById('fDate').value=todayStr();
    document.getElementById('fTime').value='12:00';
    document.getElementById('fLoc').value='';
    document.getElementById('fCat').value='work';
    buildColorPick(COLORS[0]);
    delBtn.style.display='none';
  }
}

function closeModal(){
  document.getElementById('modalBg').style.display='none';
  editId=null;
}

function saveEvent(){
  const title=document.getElementById('fTitle').value.trim();
  const date=document.getElementById('fDate').value;
  const time=document.getElementById('fTime').value;
  if(!title){toast('Please enter a title','err');return}
  if(!date){toast('Please select a date','err');return}
  if(!time){toast('Please select a time','err');return}
  const ev={
    id:editId||Date.now().toString(),
    title,
    desc:document.getElementById('fDesc').value.trim(),
    date,time,
    loc:document.getElementById('fLoc').value.trim(),
    cat:document.getElementById('fCat').value,
    color:selColor
  };
  if(editId){
    const i=events.findIndex(e=>e.id===editId);
    if(i>-1)events[i]=ev;
    toast('Event updated');
  }else{
    events.push(ev);
    toast('Event created!');
    confetti({particleCount:70,spread:50,origin:{y:0.6}});
  }
  closeModal();save();
}

function deleteEvent(){
  if(!confirm('Delete this event?'))return;
  events=events.filter(e=>e.id!==editId);
  closeModal();save();toast('Event deleted','err');
}

function quickDel(id){
  if(!confirm('Delete this event?'))return;
  events=events.filter(e=>e.id!==id);
  save();toast('Event deleted','err');
}

function toast(msg,type='ok'){
  const t=document.createElement('div');
  t.className='toast'+(type==='err'?' err':'');
  t.innerHTML=`<i class="fas ${type==='err'?'fa-times-circle':'fa-check-circle'}" style="color:${type==='err'?'#ef4444':'#16a34a'}"></i>${msg}`;
  document.getElementById('toastWrap').appendChild(t);
  setTimeout(()=>t.remove(),2800);
}

function esc(s){
  if(!s)return'';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

document.getElementById('pM').onclick=()=>{calMonth--;if(calMonth<0){calMonth=11;calYear--}renderCal()};
document.getElementById('nM').onclick=()=>{calMonth++;if(calMonth>11){calMonth=0;calYear++}renderCal()};
document.getElementById('f-all').onclick=()=>{activeFilter='all';activeDateFilter=null;activeCatFilter=null;render();renderCal();renderCatFilters()};
document.getElementById('f-today').onclick=()=>{activeFilter='today';activeDateFilter=null;activeCatFilter=null;render();renderCal();renderCatFilters()};
document.getElementById('f-week').onclick=()=>{activeFilter='week';activeDateFilter=null;activeCatFilter=null;render();renderCal();renderCatFilters()};
document.getElementById('f-upcoming').onclick=()=>{activeFilter='upcoming';activeDateFilter=null;activeCatFilter=null;render();renderCal();renderCatFilters()};
document.getElementById('f-past').onclick=()=>{activeFilter='past';activeDateFilter=null;activeCatFilter=null;render();renderCal();renderCatFilters()};
document.getElementById('clearBtn').onclick=clearAll;
document.getElementById('searchIn').oninput=e=>{searchQ=e.target.value;render()};
document.getElementById('sortSel').onchange=e=>{sortMode=e.target.value;render()};
document.getElementById('modalBg').onclick=e=>{if(e.target===document.getElementById('modalBg'))closeModal()};

load();
</script>
</body>
</html>
