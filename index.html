<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TEMPUS | Precision in Every Moment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .glass-card { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); }
        .event-item { transition: all 0.2s ease; }
        .event-item:hover { transform: translateX(4px); background: #faf5ff; }
        .stat-card { transition: all 0.2s; }
        .stat-card:hover { transform: translateY(-2px); }
        .modal-popup { animation: modalFade 0.2s ease; }
        @keyframes modalFade {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .calendar-day {
            transition: all 0.15s;
            cursor: pointer;
        }
        .calendar-day:hover {
            background: #e9d5ff;
            transform: scale(1.05);
        }
        .calendar-day.today {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-weight: bold;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #c084fc; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-6xl mx-auto">
    <!-- Header -->
    <div class="text-center mb-8">
        <div class="inline-block">
            <h1 class="text-5xl md:text-6xl font-extrabold text-white tracking-tight drop-shadow-lg">TEMPUS</h1>
            <div class="h-1 w-24 bg-gradient-to-r from-white/50 to-white/0 mx-auto mt-2 rounded-full"></div>
        </div>
        <p class="text-white/80 text-base md:text-lg mt-3 font-light tracking-wide">Precision in Every Moment</p>
    </div>

    <!-- Main Dashboard Card -->
    <div class="glass-card rounded-3xl shadow-2xl overflow-hidden">
        
        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 p-6 bg-gradient-to-r from-purple-50/50 to-indigo-50/50 border-b border-purple-100">
            <div class="stat-card bg-white rounded-2xl p-4 text-center shadow-sm">
                <i class="fas fa-calendar-alt text-purple-500 text-2xl mb-2"></i>
                <p class="text-3xl font-bold text-gray-800" id="totalEvents">0</p>
                <p class="text-gray-500 text-sm font-medium">Total Events</p>
            </div>
            <div class="stat-card bg-white rounded-2xl p-4 text-center shadow-sm">
                <i class="fas fa-hourglass-half text-indigo-500 text-2xl mb-2"></i>
                <p class="text-3xl font-bold text-gray-800" id="upcomingEvents">0</p>
                <p class="text-gray-500 text-sm font-medium">Upcoming</p>
            </div>
            <div class="stat-card bg-white rounded-2xl p-4 text-center shadow-sm">
                <i class="fas fa-check-circle text-green-500 text-2xl mb-2"></i>
                <p class="text-3xl font-bold text-gray-800" id="completedEvents">0</p>
                <p class="text-gray-500 text-sm font-medium">Completed</p>
            </div>
        </div>

        <!-- Mini Calendar + Action Bar -->
        <div class="p-6 border-b border-gray-100">
            <!-- Mini Calendar -->
            <div class="bg-white rounded-2xl p-4 shadow-sm mb-6">
                <div class="flex justify-between items-center mb-4">
                    <button id="prevMonth" class="text-purple-600 hover:text-purple-800 p-2 rounded-full hover:bg-purple-50 transition">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <h3 id="monthYear" class="text-lg font-semibold text-gray-700"></h3>
                    <button id="nextMonth" class="text-purple-600 hover:text-purple-800 p-2 rounded-full hover:bg-purple-50 transition">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
                <div class="grid grid-cols-7 gap-1 text-center text-xs font-semibold text-gray-500 mb-2">
                    <div>Su</div><div>Mo</div><div>Tu</div><div>We</div><div>Th</div><div>Fr</div><div>Sa</div>
                </div>
                <div id="calendarGrid" class="grid grid-cols-7 gap-1 text-center text-sm">
                    <!-- Calendar days will be injected here -->
                </div>
                <p class="text-xs text-gray-400 text-center mt-3">
                    <i class="fas fa-info-circle mr-1"></i> Click any date to jump to events on that day
                </p>
            </div>

            <!-- Search Bar -->
            <div class="flex flex-col sm:flex-row justify-between items-center gap-4">
                <button onclick="openEventModal()" class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white px-6 py-3 rounded-xl font-semibold hover:shadow-lg transition-all duration-200 flex items-center gap-2">
                    <i class="fas fa-plus-circle"></i> New Event
                </button>
                <div class="relative w-full sm:w-72">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                    <input type="text" id="searchInput" placeholder="Search events..." class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-purple-300 transition">
                </div>
            </div>
        </div>

        <!-- Events List -->
        <div class="p-6">
            <h2 class="text-lg font-semibold text-gray-700 mb-4 flex items-center gap-2">
                <i class="fas fa-list-ul text-purple-500"></i> Your Events
            </h2>
            <div id="eventsContainer" class="space-y-3 max-h-96 overflow-y-auto pr-2">
                <div class="text-center text-gray-400 py-12">
                    <i class="fas fa-calendar-plus text-4xl mb-3 opacity-50"></i>
                    <p>No events yet. Click "New Event" to begin your journey.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer Note -->
    <div class="text-center mt-6 text-white/60 text-xs">
        <i class="fas fa-database mr-1"></i> Events saved locally · Your data stays with you
    </div>
</div>

<!-- MODAL: Add/Edit Event -->
<div id="eventModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl w-full max-w-md modal-popup shadow-2xl">
        <div class="p-6">
            <div class="flex justify-between items-center mb-5">
                <h3 id="modalTitle" class="text-xl font-bold text-gray-800">✨ New Event</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>
            <input type="hidden" id="eventId">
            
            <div class="space-y-4">
                <input type="text" id="eventTitle" placeholder="Event title *" class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-400 transition">
                
                <textarea id="eventDesc" rows="2" placeholder="Description (optional)" class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-400 resize-none"></textarea>
                
                <div class="grid grid-cols-2 gap-3">
                    <input type="date" id="eventDate" class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-400">
                    <input type="time" id="eventTime" class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-400">
                </div>
                
                <input type="text" id="eventLocation" placeholder="Location (optional)" class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-400">
            </div>
            
            <div class="flex gap-3 mt-6">
                <button onclick="saveEvent()" class="flex-1 bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-3 rounded-xl font-semibold hover:opacity-90 transition">
                    <i class="fas fa-save mr-1"></i> Save
                </button>
                <button onclick="closeModal()" class="flex-1 bg-gray-100 text-gray-700 py-3 rounded-xl font-semibold hover:bg-gray-200 transition">
                    Cancel
                </button>
                <button id="deleteEventBtn" onclick="deleteEvent()" class="bg-red-50 text-red-600 px-5 py-3 rounded-xl font-semibold hover:bg-red-100 transition hidden">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- TOAST Notifications -->
<div id="toastContainer" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2"></div>

<script>
    // ---------- DATA ----------
    let events = [];
    let currentEditId = null;
    let searchQuery = '';
    
    // Calendar state
    let currentCalendarDate = new Date();

    // Load from localStorage
    function loadData() {
        const stored = localStorage.getItem('tempus_events');
        if (stored) {
            events = JSON.parse(stored);
        } else {
            // Demo events
            const today = new Date();
            const tomorrow = new Date(today);
            tomorrow.setDate(today.getDate() + 1);
            const nextWeek = new Date(today);
            nextWeek.setDate(today.getDate() + 5);
            
            events = [
                {
                    id: '1',
                    title: '🎯 Team Sync',
                    description: 'Weekly sprint planning',
                    date: today.toISOString().split('T')[0],
                    time: '10:00',
                    location: 'Conference Room A'
                },
                {
                    id: '2',
                    title: '💡 Brainstorming',
                    description: 'New product ideas',
                    date: tomorrow.toISOString().split('T')[0],
                    time: '14:30',
                    location: 'Zoom'
                },
                {
                    id: '3',
                    title: '📊 Review Meeting',
                    description: 'Q2 performance review',
                    date: nextWeek.toISOString().split('T')[0],
                    time: '11:00',
                    location: 'Board Room'
                }
            ];
            saveData();
        }
        renderAll();
        renderCalendar();
    }

    function saveData() {
        localStorage.setItem('tempus_events', JSON.stringify(events));
        renderAll();
        renderCalendar(); // Refresh calendar to show event dots
    }

    function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = `bg-white rounded-xl shadow-lg px-5 py-3 flex items-center gap-3 border-l-4 ${type === 'success' ? 'border-green-500' : 'border-red-500'} text-gray-700 text-sm`;
        toast.innerHTML = `<i class="fa-regular ${type === 'success' ? 'fa-circle-check text-green-500' : 'fa-circle-xmark text-red-500'}"></i> ${message}`;
        document.getElementById('toastContainer').appendChild(toast);
        setTimeout(() => toast.remove(), 2800);
    }

    function renderAll() {
        renderEvents();
        updateStats();
    }

    function renderEvents() {
        const container = document.getElementById('eventsContainer');
        let filteredEvents = events;
        
        if (searchQuery) {
            filteredEvents = events.filter(e => 
                e.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                (e.description && e.description.toLowerCase().includes(searchQuery.toLowerCase()))
            );
        }
        
        if (filteredEvents.length === 0) {
            container.innerHTML = `<div class="text-center text-gray-400 py-12">
                <i class="fas fa-search text-4xl mb-3 opacity-50"></i>
                <p>${searchQuery ? 'No matching events found' : 'No events yet. Click "New Event" to begin.'}</p>
            </div>`;
            return;
        }
        
        // Sort by date (upcoming first)
        const sorted = [...filteredEvents].sort((a, b) => a.date.localeCompare(b.date));
        
        container.innerHTML = sorted.map(event => {
            const isPast = event.date < new Date().toISOString().split('T')[0];
            const statusClass = isPast ? 'opacity-60' : '';
            return `
                <div class="event-item bg-white rounded-xl p-4 border border-gray-100 shadow-sm hover:shadow-md transition-all ${statusClass}">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <h3 class="font-semibold text-gray-800 text-lg">${escapeHtml(event.title)}</h3>
                            ${event.description ? `<p class="text-gray-500 text-sm mt-1">${escapeHtml(event.description)}</p>` : ''}
                            <div class="flex flex-wrap gap-4 mt-3 text-xs text-gray-400">
                                <span><i class="far fa-calendar-alt mr-1 text-purple-400"></i> ${formatDate(event.date)}</span>
                                <span><i class="far fa-clock mr-1 text-indigo-400"></i> ${event.time}</span>
                                ${event.location ? `<span><i class="fas fa-map-marker-alt mr-1 text-gray-400"></i> ${escapeHtml(event.location)}</span>` : ''}
                                ${isPast ? '<span class="text-gray-400"><i class="fas fa-check-circle mr-1"></i> Completed</span>' : '<span class="text-green-500"><i class="fas fa-hourglass-half mr-1"></i> Upcoming</span>'}
                            </div>
                        </div>
                        <div class="flex gap-2 ml-4">
                            <button onclick="editEvent('${event.id}')" class="text-purple-500 hover:text-purple-700 p-2 rounded-full hover:bg-purple-50 transition">
                                <i class="fas fa-pen"></i>
                            </button>
                            <button onclick="deleteEventById('${event.id}')" class="text-red-400 hover:text-red-600 p-2 rounded-full hover:bg-red-50 transition">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function formatDate(dateStr) {
        const date = new Date(dateStr);
        const today = new Date();
        const tomorrow = new Date(today);
        tomorrow.setDate(today.getDate() + 1);
        
        if (date.toDateString() === today.toDateString()) return 'Today';
        if (date.toDateString() === tomorrow.toDateString()) return 'Tomorrow';
        return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function updateStats() {
        const total = events.length;
        const today = new Date().toISOString().split('T')[0];
        const upcoming = events.filter(e => e.date >= today).length;
        const completed = events.filter(e => e.date < today).length;
        
        document.getElementById('totalEvents').innerText = total;
        document.getElementById('upcomingEvents').innerText = upcoming;
        document.getElementById('completedEvents').innerText = completed;
    }

    // ---------- CALENDAR FUNCTIONS ----------
    function renderCalendar() {
        const year = currentCalendarDate.getFullYear();
        const month = currentCalendarDate.getMonth();
        
        const firstDay = new Date(year, month, 1);
        const startWeekday = firstDay.getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        
        // Update month/year display
        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        document.getElementById('monthYear').innerText = `${monthNames[month]} ${year}`;
        
        // Build calendar grid
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        
        // Empty cells for days before month starts
        for (let i = 0; i < startWeekday; i++) {
            const emptyDiv = document.createElement('div');
            emptyDiv.className = 'text-gray-300 py-2';
            emptyDiv.innerHTML = '';
            grid.appendChild(emptyDiv);
        }
        
        // Days of the month
        const today = new Date();
        const todayStr = today.toISOString().split('T')[0];
        
        for (let day = 1; day <= daysInMonth; day++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            const isToday = dateStr === todayStr;
            
            const hasEvent = events.some(e => e.date === dateStr);
            
            const dayDiv = document.createElement('div');
            dayDiv.className = `calendar-day py-2 rounded-full transition ${isToday ? 'today' : 'hover:bg-purple-100'} ${hasEvent ? 'font-bold' : ''}`;
            dayDiv.innerHTML = `<span class="${hasEvent && !isToday ? 'text-purple-600' : ''}">${day}</span>`;
            
            // Add event dot indicator
            if (hasEvent && !isToday) {
                dayDiv.innerHTML += `<div class="w-1 h-1 bg-purple-500 rounded-full mx-auto mt-0.5"></div>`;
            }
            
            // Click to filter events by this date
            dayDiv.addEventListener('click', () => {
                document.getElementById('searchInput').value = dateStr;
                searchQuery = dateStr;
                renderEvents();
                showToast(`Showing events on ${dateStr}`, 'success');
            });
            
            grid.appendChild(dayDiv);
        }
    }

    function prevMonth() {
        currentCalendarDate.setMonth(currentCalendarDate.getMonth() - 1);
        renderCalendar();
    }
    
    function nextMonth() {
        currentCalendarDate.setMonth(currentCalendarDate.getMonth() + 1);
        renderCalendar();
    }

    // ---------- EVENT CRUD ----------
    function openEventModal(event = null) {
        const modal = document.getElementById('eventModal');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        
        if (event) {
            document.getElementById('modalTitle').innerText = '✏️ Edit Event';
            document.getElementById('eventId').value = event.id;
            document.getElementById('eventTitle').value = event.title;
            document.getElementById('eventDesc').value = event.description || '';
            document.getElementById('eventDate').value = event.date;
            document.getElementById('eventTime').value = event.time;
            document.getElementById('eventLocation').value = event.location || '';
            document.getElementById('deleteEventBtn').classList.remove('hidden');
            currentEditId = event.id;
        } else {
            document.getElementById('modalTitle').innerText = '✨ New Event';
            document.getElementById('eventId').value = '';
            document.getElementById('eventTitle').value = '';
            document.getElementById('eventDesc').value = '';
            document.getElementById('eventDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('eventTime').value = '12:00';
            document.getElementById('eventLocation').value = '';
            document.getElementById('deleteEventBtn').classList.add('hidden');
            currentEditId = null;
        }
    }

    function saveEvent() {
        const title = document.getElementById('eventTitle').value.trim();
        const date = document.getElementById('eventDate').value;
        const time = document.getElementById('eventTime').value;
        
        if (!title) {
            showToast('Please enter an event title', 'error');
            return;
        }
        if (!date) {
            showToast('Please select a date', 'error');
            return;
        }
        if (!time) {
            showToast('Please select a time', 'error');
            return;
        }
        
        const eventData = {
            id: currentEditId || Date.now().toString(),
            title: title,
            description: document.getElementById('eventDesc').value,
            date: date,
            time: time,
            location: document.getElementById('eventLocation').value
        };
        
        if (currentEditId) {
            const index = events.findIndex(e => e.id === currentEditId);
            if (index !== -1) {
                events[index] = eventData;
                showToast('Event updated successfully ✨');
            }
        } else {
            events.push(eventData);
            showToast('Event created! 🎉');
            canvasConfetti({ particleCount: 80, spread: 55, origin: { y: 0.6 } });
        }
        
        saveData();
        closeModal();
    }

    function deleteEvent() {
        if (confirm('Are you sure you want to delete this event?')) {
            events = events.filter(e => e.id !== currentEditId);
            saveData();
            showToast('Event deleted', 'success');
            closeModal();
        }
    }

    function deleteEventById(id) {
        if (confirm('Delete this event?')) {
            events = events.filter(e => e.id !== id);
            saveData();
            showToast('Event deleted', 'success');
        }
    }

    function editEvent(id) {
        const event = events.find(e => e.id === id);
        if (event) openEventModal(event);
    }

    function closeModal() {
        const modal = document.getElementById('eventModal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
        currentEditId = null;
    }

    // Search functionality
    document.getElementById('searchInput').addEventListener('input', (e) => {
        searchQuery = e.target.value;
        renderEvents();
    });

    // Calendar navigation
    document.getElementById('prevMonth').addEventListener('click', prevMonth);
    document.getElementById('nextMonth').addEventListener('click', nextMonth);

    // Click outside modal to close
    document.getElementById('eventModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('eventModal')) closeModal();
    });

    // Initialize
    loadData();
</script>
</body>
</html>
